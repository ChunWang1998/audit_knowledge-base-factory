benchmark: audit
metric: recall
# seed_skill 留空；透過 --seed-skill-file ../prompts/griefing-attacks/gas-griefing.txt 在 CLI 載入。
# griefing-attacks 下有三份子 prompt（gas-griefing / logic-griefing / withdrawal-griefing）。
# 初期使用 gas-griefing.txt 作為種子；待分數穩定後再分三份 config 各自優化。
seed_skill: ""

model:
  base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  target_model: "gpt-4o"
  optimizer_model: "gpt-4o"
  temperature: 0.0
  optimizer_temperature: 0.7
  max_tokens: 1024
  optimizer_max_tokens: 2048
  timeout: 300.0
  max_retries: 4

train:
  num_epochs: 5
  batch_size: 10
  val_size: 60        # 120 個 Griefing Attacks issues 的一半
  workers: 8
  patience: 4
  min_improvement: 0.0
  seed: 42
